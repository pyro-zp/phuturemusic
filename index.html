<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PHUTUREMUSIC // NIGHT BEACH</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Space+Grotesk:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:'Space Grotesk', sans-serif;
    touch-action: pan-x pan-y; /* сохраняем скролл, но убираем зумирование двойным тапом */
}

/* stage space */
.stage{
    position:fixed;
    inset:0;
    perspective:900px;
    overflow:hidden;
}

/* moving light fog + tiny red hint from distant fire (left side) */
.fog{
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle at center, rgba(255,0,255,0.15), transparent 40%),
               radial-gradient(circle at 30% 70%, rgba(0,255,255,0.12), transparent 50%),
               radial-gradient(circle at 20% 85%, rgba(255,60,30,0.1), transparent 60%);
    animation:drift 10s infinite alternate;
    transform:translateZ(-200px);
}

@keyframes drift{
    0%{transform:translate(-10%, -10%) scale(1);}
    100%{transform:translate(10%, 10%) scale(1.2);}
}

/* floating stage core */
.core{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotateX(20deg);
    text-align:center;
    transition:0.05s linear;
}

/* glitch title */
h1{
    font-family:'Rubik Glitch', cursive;
    font-size:clamp(40px, 12vw, 140px);
    color:#fff;
    text-shadow:
        0 0 20px #ff00ff,
        0 0 40px #00ffff;
    animation:glitch 2s infinite;
    margin:0;
    padding:0 15px;
    text-align: center;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(-2px,1px);}
    50%{transform:translate(2px,-1px);}
    75%{transform:translate(-1px,2px);}
    100%{transform:translate(0);}
}

/* lights */
.beam{
    position:absolute;
    width:2px;
    height:100vh;
    background:linear-gradient(to bottom, transparent, #ff00ff, transparent);
    left:50%;
    transform-origin:top;
    animation:rotate 6s linear infinite;
    opacity:0.5;
}

@keyframes rotate{
    0%{transform:rotate(0deg) translateX(-200px);}
    100%{transform:rotate(360deg) translateX(-200px);}
}

/* stars */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    will-change: transform;
}

/* BOOK - скромная кнопка */
.book{
    position:fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) translateY(125px);
    padding: 6px 18px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-weight: 500;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.15);
    transition: all 0.25s ease;
    z-index: 20;
    font-size: 12px;
    letter-spacing: 2.5px;
    white-space: nowrap;
    font-family: 'Space Grotesk', sans-serif;
}

.book:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 0 12px rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
}

/* ССЫЛКИ - с фирменными цветами при наведении */
.footer-links{
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: clamp(12px, 5vw, 35px);
    z-index: 20;
    font-size: clamp(9px, 3vw, 11px);
    letter-spacing: 1px;
    flex-wrap: wrap;
    padding: 0 12px;
}

.footer-links a{
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    transition: 0.2s;
    font-weight: 300;
    font-family: 'Space Grotesk', sans-serif;
    white-space: nowrap;
}

/* YouTube */
.footer-links a:nth-child(1):hover {
    color: #FF0000;
    text-shadow: 0 0 8px #FF0000;
}

/* Spotify */
.footer-links a:nth-child(2):hover {
    color: #1DB954;
    text-shadow: 0 0 8px #1DB954;
}

/* Instagram */
.footer-links a:nth-child(3):hover {
    color: #E4405F;
    text-shadow: 0 0 8px #E4405F;
}

/* Bandcamp */
.footer-links a:nth-child(4):hover {
    color: #629aa9;
    text-shadow: 0 0 8px #629aa9;
}

/* SoundCloud */
.footer-links a:nth-child(5):hover {
    color: #FF5500;
    text-shadow: 0 0 8px #FF5500;
}

/* адаптив для маленьких экранов */
@media (max-width: 600px) {
    .book {
        transform: translate(-50%, -50%) translateY(90px);
        font-size: 10px;
        padding: 5px 14px;
        letter-spacing: 2px;
    }
    
    .footer-links {
        bottom: 15px;
        gap: 12px;
    }
    
    /* чуть меньше звёзд для производительности */
    .star {
        width: 1.5px;
        height: 1.5px;
    }
    
    .beam {
        width: 1.5px;
        opacity: 0.4;
    }
}

/* альбомная ориентация на телефонах */
@media (max-width: 900px) and (orientation: landscape) {
    h1 {
        font-size: clamp(30px, 8vw, 80px);
    }
    .book {
        transform: translate(-50%, -50%) translateY(70px);
    }
}
</style>
</head>

<body>

<div class="stage">
    <div class="fog"></div>
    <div class="beam"></div>
    <div class="core" id="core">
        <h1>PHUTUREMUSIC</h1>
    </div>
</div>

<a class="book" href="mailto:info@phuturemusic.com?subject=Booking">BOOK</a>

<div class="footer-links">
    <a href="https://youtube.com/phuturemusic" target="_blank">YOUTUBE</a>
    <a href="https://open.spotify.com/artist/6tWax7cmD5UcUZU259RW9H?si=6238469e6e5d48a0" target="_blank">SPOTIFY</a>
    <a href="https://www.instagram.com/phuturemusic" target="_blank">INSTAGRAM</a>
    <a href="https://phuturemusic.bandcamp.com" target="_blank">BANDCAMP</a>
    <a href="https://soundcloud.com/phuture_music" target="_blank">SOUNDCLOUD</a>
</div>

<script>
/* ===== ЗВЁЗДЫ С ПАРАЛЛАКСОМ ЗА МЫШЬЮ / АКСЕЛЕРОМЕТРОМ ===== */
const starsContainer = document.body;
const stars = [];

// количество звёзд: на телефонах чуть меньше для плавности
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
const starCount = isMobile ? 180 : 280;

for(let i=0;i<starCount;i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.top = Math.random() * window.innerHeight + "px";
    s.style.opacity = 0.3 + Math.random() * 0.6;
    starsContainer.appendChild(s);
    stars.push(s);
}

let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;

// === УПРАВЛЕНИЕ: мышь или акселерометр ===
let controlMode = 'mouse'; // mouse или device

// мышь
document.addEventListener("mousemove", (e) => {
    if (controlMode === 'mouse') {
        targetX = (e.clientX / window.innerWidth - 0.5) * 30;
        targetY = (e.clientY / window.innerHeight - 0.5) * 20;
    }
});

// акселерометр (только если разрешено пользователем)
let deviceOrientationGranted = false;

function handleOrientation(e) {
    if (!deviceOrientationGranted) return;
    controlMode = 'device';
    
    // gamma: left/right (-90 до 90), beta: front/back (-90 до 90)
    let gamma = e.gamma || 0;
    let beta = e.beta || 0;
    
    // нормализуем и ограничиваем
    let x = Math.max(-25, Math.min(25, gamma * 0.35));
    let y = Math.max(-18, Math.min(18, beta * 0.25));
    
    targetX = x;
    targetY = y;
}

// запрос разрешения на iOS 13+
function requestDeviceOrientation() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS: требуется явное разрешение
        DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
                if (permissionState === 'granted') {
                    deviceOrientationGranted = true;
                    window.addEventListener('deviceorientation', handleOrientation);
                    controlMode = 'device';
                }
            })
            .catch(console.error);
    } else {
        // Android и др. — просто включаем
        deviceOrientationGranted = true;
        window.addEventListener('deviceorientation', handleOrientation);
        controlMode = 'device';
    }
}

// касание по экрану включает акселерометр (и шум)
let orientationRequested = false;
document.body.addEventListener('touchstart', () => {
    if (!orientationRequested && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        requestDeviceOrientation();
        orientationRequested = true;
    } else if (!orientationRequested) {
        deviceOrientationGranted = true;
        window.addEventListener('deviceorientation', handleOrientation);
        orientationRequested = true;
    }
    initWaveNoise();
}, { once: false });

// чтобы акселерометр не срабатывал постоянно после первого раза
let orientationActive = false;
function handleOrientationOnce(e) {
    if (!orientationActive && deviceOrientationGranted) {
        orientationActive = true;
        handleOrientation(e);
    } else if (orientationActive) {
        handleOrientation(e);
    }
}
window.addEventListener('deviceorientation', handleOrientationOnce);

// плавное обновление параллакса
function updateParallax() {
    currentX += (targetX - currentX) * 0.12;
    currentY += (targetY - currentY) * 0.12;
    
    stars.forEach(star => {
        const xOff = currentX * (0.5 + Math.random() * 0.5);
        const yOff = currentY * (0.5 + Math.random() * 0.5);
        star.style.transform = `translate(${xOff}px, ${yOff}px)`;
    });
    
    requestAnimationFrame(updateParallax);
}
updateParallax();

/* ===== ИНТЕРАКТИВНЫЙ ПАРАЛЛАКС ЗАГОЛОВКА ===== */
let headerTargetX = 0, headerTargetY = 0;
let headerCurrentX = 0, headerCurrentY = 0;

function updateHeader() {
    headerCurrentX += (headerTargetX - headerCurrentX) * 0.12;
    headerCurrentY += (headerTargetY - headerCurrentY) * 0.12;
    document.getElementById("core").style.transform =
        `translate(-50%,-50%) rotateX(${20 + headerCurrentY}deg) rotateY(${headerCurrentX}deg)`;
    requestAnimationFrame(updateHeader);
}
updateHeader();

function handleInputForHeader(x, y) {
    headerTargetX = x * 0.7;
    headerTargetY = y * 0.7;
}

// мышь для заголовка
document.addEventListener("mousemove", (e) => {
    if (controlMode === 'mouse') {
        let x = (e.clientX / window.innerWidth - 0.5) * 20;
        let y = (e.clientY / window.innerHeight - 0.5) * 20;
        handleInputForHeader(x, y);
    }
});

// акселерометр для заголовка
function handleOrientationForHeader(e) {
    if (controlMode === 'device' && deviceOrientationGranted) {
        let gamma = e.gamma || 0;
        let beta = e.beta || 0;
        let x = Math.max(-18, Math.min(18, gamma * 0.45));
        let y = Math.max(-14, Math.min(14, beta * 0.3));
        handleInputForHeader(x, y);
    }
}
window.addEventListener('deviceorientation', handleOrientationForHeader);

/* ===== ЛЁГКИЙ ГЕНЕРАТОР ШУМА (волны, VCA ~1.5 Гц) ===== */
let audioContext = null;
let isPlaying = false;
let gainNode = null;
let noiseNode = null;

function initWaveNoise() {
    if (audioContext && isPlaying) return;
    
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    const bufferSize = 4096;
    const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.12;
    }
    
    noiseNode = audioContext.createBufferSource();
    noiseNode.buffer = noiseBuffer;
    noiseNode.loop = true;
    
    gainNode = audioContext.createGain();
    gainNode.gain.value = 0.06;
    
    noiseNode.connect(gainNode);
    gainNode.connect(audioContext.destination);
    noiseNode.start();
    
    isPlaying = true;
    
    let startTime = audioContext.currentTime;
    function modulateVolume() {
        if (!gainNode) return;
        const t = (audioContext.currentTime - startTime);
        const lfo = 0.04 + 0.025 * Math.sin(t * Math.PI * 2 * 1.5);
        gainNode.gain.linearRampToValueAtTime(lfo, audioContext.currentTime + 0.05);
        requestAnimationFrame(modulateVolume);
    }
    modulateVolume();
}

document.body.addEventListener('click', () => {
    initWaveNoise();
}, { once: true });

document.body.addEventListener('touchstart', () => {
    initWaveNoise();
}, { once: true });

let noiseStarted = false;
document.addEventListener('mousemove', () => {
    if (!noiseStarted) {
        initWaveNoise();
        noiseStarted = true;
    }
}, { once: true });

/* ===== МЯГКИЙ ПУЛЬС (красноватый отблеск костра слева) ===== */
setInterval(()=>{
    const flash = document.createElement('div');
    flash.style.position = 'fixed';
    flash.style.inset = '0';
    flash.style.background = 'radial-gradient(circle at 20% 85%, rgba(255,70,40,0.12), rgba(255,0,255,0.04), transparent 70%)';
    flash.style.pointerEvents = 'none';
    flash.style.zIndex = '15';
    flash.style.mixBlendMode = 'screen';
    document.body.appendChild(flash);
    
    setTimeout(() => {
        flash.style.transition = 'opacity 0.4s ease';
        flash.style.opacity = '0';
        setTimeout(() => flash.remove(), 500);
    }, 100);
}, 2800);

/* ===== РЕСАЙЗ ЗВЁЗД ===== */
let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
        stars.forEach(star => {
            star.style.left = Math.random() * window.innerWidth + "px";
            star.style.top = Math.random() * window.innerHeight + "px";
        });
    }, 200);
});

// отключаем параллакс при скролле на телефонах (опционально)
let ticking = false;
window.addEventListener('scroll', () => {
    if (!ticking) {
        requestAnimationFrame(() => {
            // ничего не делаем, просто чтобы не было ошибок
            ticking = false;
        });
        ticking = true;
    }
});

// подсказка для пользователя (опционально, через консоль)
console.log('🌊 PHUTUREMUSIC — наклоняй телефон для управления');
</script>

</body>
</html>
